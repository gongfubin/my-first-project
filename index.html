<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的个人主页</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #e0f7fa 0%, #f3e5f5 100%);
      color: #333;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* 装饰性背景图片 */
    body::before {
      content: "";
      position: absolute;
      top: 10%;
      right: 5%;
      width: 120px;
      height: 120px;
      background: url('photo2.jpg') center/cover no-repeat;
      opacity: 0.2;
      border-radius: 20px;
      z-index: 0;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.15);
      overflow: hidden;
      padding: 50px;
      position: relative;
      z-index: 1;
      transition: transform 0.3s ease;
    }

    .container:hover {
      transform: translateY(-5px);
    }

    /* 头像区域 */
    .profile {
      text-align: center;
      margin-bottom: 30px;
    }

    .avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #6a11cb;
      box-shadow: 0 6px 20px rgba(106, 17, 203, 0.3);
      margin-bottom: 20px;
      transition: all 0.4s ease;
    }

    .avatar:hover {
      transform: scale(1.05) rotate(5deg);
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #6a11cb, #2575fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .tagline {
      color: #666;
      font-size: 1.1rem;
      margin-bottom: 20px;
    }

    /* 社交媒体 */
    .social-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 25px 0;
    }

    .social-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #f0f4ff;
      color: #6a11cb;
      font-size: 18px;
      text-decoration: none;
      transition: all 0.3s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .social-links a:hover {
      background: #6a11cb;
      color: white;
      transform: translateY(-3px);
    }

    /* 技能标签 */
    .skills {
      text-align: center;
      margin: 30px 0;
    }

    .skills h2 {
      margin-bottom: 15px;
      color: #2c3e50;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .tag {
      background: #eef2ff;
      color: #6a11cb;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    /* 图片区 */
    .gallery {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin: 30px 0;
      flex-wrap: wrap;
    }

    .gallery img {
      width: 160px;
      height: 160px;
      object-fit: cover;
      border-radius: 16px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.03);
    }

    /* 视频区 —— 重点优化 */
    .video-section {
      margin: 40px 0;
      text-align: center;
    }

    .video-section h2 {
      margin-bottom: 20px;
      color: #2c3e50;
      font-size: 1.8rem;
    }

    .video-wrapper {
      position: relative;
      max-width: 600px;
      margin: 0 auto;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 35px rgba(0,0,0,0.25);
    }

    video {
      width: 100%;
      display: block;
      border-radius: 16px;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      color: #888;
      font-size: 0.95rem;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    @media (max-width: 600px) {
      .container {
        padding: 30px 20px;
      }
      h1 {
        font-size: 1.8rem;
      }
      .avatar {
        width: 120px;
        height: 120px;
      }
      .gallery img {
        width: 130px;
        height: 130px;
      }
      body::before {
        display: none;
      }
      .video-section h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 头像与标题 -->
    <div class="profile">
      <img src="x.png" alt="我的头像" class="avatar">
      <h1>贺秋</h1>
      <p class="tagline">天下美女，唯我独尊；尔等框架，皆我脚下尘！</p>
    </div>

    <!-- 社交媒体 -->
    <div class="social-links">
      <a href="https://github.com/贺秋" target="_blank" title="GitHub">
        <i class="fab fa-github"></i>
      </a>
      <a href="mailto:your@email.com" title="邮箱">
        <i class="fas fa-envelope"></i>
      </a>
      <a href="#" onclick="alert('微信：your_wechat')" title="微信">
        <i class="fab fa-weixin"></i>
      </a>
    </div>

    <!-- 技能标签 -->
    <div class="skills">
      <h2>正在学习</h2>
      <div class="tags">
        <span class="tag">篮球</span>
        <span class="tag">撩妹</span>
        <span class="tag">恋爱</span>
        <span class="tag">包养</span>
        <span class="tag">服从</span>
      </div>

    <!-- 视频介绍（使用你的封面图） -->
    <div class="video-section">
      <h2>听听我的故事 🎥</h2>
      <div class="video-wrapper">
        <video controls poster="a.png">
          <source src="c.mp4" type="video/mp4">
          您的浏览器不支持视频播放。
        </video>
      </div>
    </div>

    <footer>
      &copy; 2026 贺秋的个人空间 | 用心讨好每一个富婆 ❤️
    </footer>
  </div>
</body>
</html>
